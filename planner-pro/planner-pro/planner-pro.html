  const out = [];
  for (let i = 0; i < 7; i++) {
    const dd = new Date(mon);
    dd.setDate(mon.getDate() + i);

const LS_KEYS = {

  TASKS: "planner_tasks_v1",
  GRP: "planner_grp_v1",
  FREQ: "planner_freq_v1",

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, Calibri, sans-serif;
  font-size: 9pt;
  color: ${DARK};
  background: #ffffff;
  margin: 0;
  padding: 0;
}
.page { max-width: 100%; margin: 0 auto; padding: 0.6cm 1cm; }

/* ── HEADER ── */
.doc-header {
  display: flex;
  align-items: center;
  gap: 16pt;
  padding-bottom: 8pt;
  margin-bottom: 4pt;
  border-bottom: 2pt solid ${GOLD};
}
.doc-header img { width: 52pt; height: auto; flex-shrink: 0; }
.doc-header-text {}
.doc-company {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 14pt;
  font-weight: bold;
  color: ${DARK};
  letter-spacing: 1pt;
  line-height: 1.1;
}
.doc-company span { color: ${GOLD}; }
.doc-subtitle {
  font-size: 8pt;
  color: #888;
  margin-top: 2pt;
  letter-spacing: 0.3pt;
  text-transform: uppercase;
}
.doc-meta {
  margin-top: 3pt;
  font-size: 9pt;
  color: ${DARK};
}
.doc-meta b { color: ${GOLD}; }

/* ── RECAP GLOBAL ── */
.global-recap {
  background: ${GOLD_LIGHT};
  border: 1pt solid #e0c97a;
  border-left: 3pt solid ${GOLD};
  border-radius: 2pt;
  padding: 6pt 10pt;
  margin: 8pt 0;
  display: flex;
  gap: 0;
  align-items: stretch;
}
.recap-stat {
  flex: 1;
  text-align: center;
  border-right: 1pt solid #e0c97a;
  padding: 0 8pt;
}
.recap-stat:last-child { border-right: none; }
.recap-stat .val {
  display: block;
  font-size: 12pt;
  font-weight: bold;
  color: ${DARK};
  line-height: 1.2;
}
.recap-stat .lbl {
  display: block;
  font-size: 7pt;
  color: #a08050;
  text-transform: uppercase;
  letter-spacing: 0.5pt;
  margin-top: 2pt;
}

/* ── BLOC JOUR ── */
.day-block { margin-bottom: 10pt; page-break-inside: avoid; }
.day-header { margin-bottom: 4pt; padding-bottom: 3pt; border-bottom: 1.5pt solid ${GOLD}; }
.day-title {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 10.5pt;
  font-weight: bold;
  color: ${DARK};
  letter-spacing: 0.5pt;
  text-transform: uppercase;
}
.day-info {

  color: #666;
  margin-top: 1pt;
}
.day-info .dstart { color: ${DARK}; font-weight: bold; }

.day-info .dlate  { color: #c62828; font-weight: bold; }

.interv {

  margin-bottom: 3pt;
  background: #fdfcfa;
  border-left: 2.5pt solid #e0c97a;
}

  min-width: 50pt;
  flex-shrink: 0;
  text-align: center;
}
.interv-tstart {
  font-size: 10pt;
  font-weight: bold;
  color: ${DARK};
  line-height: 1;
}
.interv-arrow { font-size: 8pt; color: #bbb; margin: 1pt 0; }

  color: ${GOLD};

}

}

}

  margin-top: 2pt;

}
.tag {

  padding: 1pt 5pt;
  border-radius: 2pt;
  font-weight: normal;
}
.tag-prest { background: #edf5ed; color: #2e6b2e; border: 0.5pt solid #b0d4b0; }
.tag-trajet { background: #fdf3e6; color: #8a5a00; border: 0.5pt solid #e8c880; }

  border-radius: 2pt;
  padding: 3pt 10pt;
  margin-top: 3pt;
  font-size: 8pt;
}
.day-recap-item { flex: 1; color: #5a4000; }
.day-recap-item b { color: ${DARK}; }
.day-recap-total { font-weight: bold; color: ${DARK}; text-align: right; }

  justify-content: space-between;
  font-size: 8pt;
  color: #aaa;
}
.doc-footer b { color: ${GOLD}; }
